name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 isort pytest pytest-cov

      - name: Lint (flake8)
        run: flake8 src/ app/ tests/ --max-line-length=120 --ignore=E203,W503

      - name: Check import order (isort)
        run: isort src/ app/ tests/ --check-only --diff

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
        env:
          # Point to localhost — no real Redis/Kafka needed for unit tests
          REDIS_HOST: "localhost"
          KAFKA_BROKER: "localhost:9092"
          MLFLOW_TRACKING_URI: "http://localhost:5000"

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose config --quiet
